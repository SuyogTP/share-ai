name: NEPSE Daily Scrape

on:
  schedule:
    # 10:15 UTC = 3:45 PM Nepal Time (NPT = UTC+5:45) – just after market close
    - cron: "15 10 * * 1-5"

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated data files

    steps:
      # 1. Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the scraper
      - name: Run NEPSE scraper
        run: python scraper.py
        env:
          # Add any secrets here if scrapers ever need auth
          DASHBOARD_USER: ${{ secrets.DASHBOARD_USER }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}

      # 5. Commit & push updated data files
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json data/data.csv scraper.log || true
          git diff --cached --quiet || git commit -m "chore: auto-update NEPSE data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
